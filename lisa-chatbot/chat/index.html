<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot LISA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  html {
    height: 100%; 
  }

  body {
    margin: 0;
    font-family: "Inter", sans-serif; 
    background: #f9f9f9; 
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; 
    overflow: hidden;
  }

  header {
    background: #19946C; 
    color: white;
    padding: 10px 15px; 
    display: flex; 
    align-items: center; 
    position: relative; 
    z-index: 10; 
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); 
    flex-shrink: 0; 
  }

  #headerProfilePic {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 12px;
    object-fit: cover;
  }

  #headerInfo {
    display: flex;
    flex-direction: column;
  }

  header h1 { 
    margin: 0; 
    font-size: 1.1em; 
    font-weight: 600; 
    color: #FFFFFF;
    line-height: 1.2;
  }
  
  header p { 
    margin: 0; 
    font-size: 0.8em; 
    opacity: .9; 
    font-weight: 400; 
    color: #FFFFFF;
    line-height: 1.2;
  }

  /* --- STYLE BARU: TOMBOL BACK/HOME --- */
  .back-btn {
    margin-left: auto; /* Ini kuncinya: dorong ke paling kanan */
    background: rgba(255, 255, 255, 0.15); /* Transparan putih */
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .back-btn:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
  }
  /* --- AKHIR STYLE TOMBOL BACK --- */
  
  #welcomeMessage,
  header p .span-light,
  header p .span-medium {
    display: none;
  }

  #chatbox {
    flex: 1; 
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .bubble {
    max-width: 85%;
    border-radius: 18px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    position: relative;
    padding: 10px 14px 28px 14px; 
  }

  .user { align-self: flex-end; background: #d2f5e8; }
  .bot { align-self: flex-start; background: white; border: 1px solid #e0e0e0; }
  
  .bubble img {
    width: 100%;
    max-width: 250px;
    border-radius: 10px;
    display: block;
    margin-top: 8px; 
  }

  .bubble video {
    width: 100%;
    max-width: 280px; 
    border-radius: 10px;
    display: block;
    margin-top: 8px; 
  }
  
  .timestamp {
    position: absolute;
    bottom: 8px;
    right: 14px;
    font-size: 11px;
    color: #777;
    opacity: 0.8;
  }

  .bubble.user .timestamp {
    color: #075e54; 
  }

  .date-separator {
    align-self: center;
    background-color: #e1f3fb;
    color: #555;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 10px;
    margin: 10px 0;
  }

  .bubble a {
    color: #007bff; 
    text-decoration: underline;
    word-break: break-all;
  }
  .bubble.user a {
    color: #0056b3; 
  }
  .bubble.bot a {
    color: #0069d9; 
  }

  #inputArea {
    display: flex;
    gap: 10px; 
    padding: 12px; 
    background: #f9f9f9; 
    border-top: 1px solid #eee; 
    flex-shrink: 0; 
    align-items: flex-end; 
    flex-wrap: wrap; 
  }

  #filePreview {
    display: none; 
    width: 100%; 
    padding: 5px 12px;
    background: #e0e0e0;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 8px; 
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #fileName {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90%;
    color: #333;
  }
  #removeFileBtn {
    background: none;
    border: none;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    color: #666;
    padding: 0 5px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    flex: 1;
  }

  textarea#userInput {
    flex: 1;
    resize: none;
    border: none; 
    border-radius: 25px; 
    padding: 12px 50px 12px 20px; 
    font-size: 15px;
    line-height: 1.4;
    max-height: 120px; 
    overflow-y: auto;
    font-family: "Inter", sans-serif; 
    background: #eeeeee; 
  }

  textarea::placeholder {
    font-weight: 300;
    color: #8a8585;
  }

  button#sendBtn {
    background: #19946C;
    color: white;
    border: none;
    padding: 0;
    border-radius: 50%; 
    cursor: pointer;
    font-weight: 600;
    width: 50px; 
    height: 50px; 
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  
  button#sendBtn img {
    width: 24px;
    height: 24px;
  }

  button#sendBtn:hover { 
    background: #059e6c; 
  }

  .fileLabel-inner {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    padding: 5px; 
  }
  .fileLabel-inner img {
    width: 24px;
    height: 24px;
    display: block;
  }

  .typing {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    width: 45px;
    height: 20px;
  }
  .dot { width: 7px; height: 7px; background-color: #aaa; border-radius: 50%; animation: bounce 1.3s infinite ease-in-out; }
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  #scrollToBottomBtn {
    display: none; 
    position: absolute;
    bottom: 90px; 
    right: 20px;
    background-color: #ffffff;
    border: 1px solid #ccc;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    align-items: center;
    justify-content: center;
  }
  #scrollToBottomBtn svg {
    width: 20px;
    height: 20px;
    fill: #333;
  }

  /* --- STYLE FORM SLIDE-UP --- */
  .form-overlay {
    display: none; /* Sembunyi by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
  }

  .form-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #f9f9f9;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    z-index: 101;
    /* Sembunyi di bawah */
    transform: translateY(100%); 
    transition: transform 0.3s ease-out;
  }
  
  .form-container.form-visible {
    transform: translateY(0); /* Muncul */
  }

  .form-container h3 {
    font-family: "Inter", sans-serif;
    font-weight: 700;
    color: #333;
    margin-top: 0;
    margin-bottom: 20px;
    text-align: center;
  }
  
  .form-container .form-field {
    margin-bottom: 15px;
  }
  
  .form-container label {
    font-family: "Inter", sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #555;
    display: block;
    margin-bottom: 5px;
  }

  .form-container input[type="text"],
  .form-container textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: #eeeeee;
    font-family: "Inter", sans-serif;
    font-size: 15px;
  }
  
  .form-container input[type="text"]:read-only {
    background: #ddd;
    opacity: 0.7;
  }

  .form-container textarea#formSaran {
    resize: none;
    height: 120px;
  }
  
  #submitFormBtn {
    width: 100%;
    background: #19946C;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-size: 16px;
    font-weight: 600;
  }
  
  #closeFormBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    font-size: 24px;
    color: #999;
    cursor: pointer;
  }
  /* --- AKHIR STYLE FORM --- */


  @media (max-width: 600px) {
    header h1 { font-size: 1.1em; } 
    header p { font-size: 0.8em; }
    textarea { font-size: 14px; }
  }
</style>
</head>

<body>
  <header>
    <img src="https://files.lingkungansehatasri.my.id/lisa-profile-picture.jpg" alt="Profile" id="headerProfilePic">
    <div id="headerInfo">
      <h1>LISA Ai</h1>
      <p>online</p>
    </div>
    
    <a href="/" class="back-btn" aria-label="Kembali ke Beranda">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
    </header>

  <div id="chatbox"></div>

  <div id="inputArea">
    <div id="filePreview">
      <span id="fileName">namafilepanjang.jpg</span>
      <button id="removeFileBtn">&times;</button>
    </div>
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="Tulis pesanmu..." rows="1"></textarea>
      <label for="fileInput" class="fileLabel-inner">
        <img src="https://files.lingkungansehatasri.my.id/attach-file-hijau.png" alt="Attach">
      </label>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <button id="sendBtn">
      <img src="https://files.lingkungansehatasri.my.id/send-putih.png" alt="Send">
    </button>
  </div>
  
  <button id="scrollToBottomBtn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17 13.41L12 18.41L7 13.41L8.41 12L12 15.59L15.59 12L17 13.41ZM17 7.41L12 12.41L7 7.41L8.41 6L12 9.59L15.59 6L17 7.41Z"/></svg>
  </button>
  
  <div class="form-overlay" id="formOverlay">
    <div class="form-container" id="formContainer">
      <button id="closeFormBtn">&times;</button>
      <h3>Kasih Saran & Masukan</h3>
      
      <form>
        <div class="form-field">
          <label for="formId">ID Sesi (Otomatis)</label>
          <input type="text" id="formId" readonly>
        </div>
        
        <div class="form-field">
          <label for="formDate">Tanggal (Otomatis)</label>
          <input type="text" id="formDate" readonly>
        </div>

        <div class="form-field">
          <label for="formSaran">Saran & Masukan Kamu</label>
          <textarea id="formSaran" placeholder="Tulis saran/masukanmu soal lingkungan sekolah di sini..." rows="4"></textarea>
        </div>
        
        <button type="submit" id="submitFormBtn">Kirim Saran</button>
      </form>
    </div>
  </div>
  <script>
    const chatbox = document.getElementById('chatbox');
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput'); 
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const removeFileBtn = document.getElementById('removeFileBtn');
    const scrollToBottomBtn = document.getElementById('scrollToBottomBtn');
    let lastMessageDate = null; 
    
    const webhookUrl = "https://n8n.terato.my.id/webhook/50e27e1d-f8f3-43e8-a1a8-53fa5eafecdf"; 

    const HISTORY_KEY = 'lisaChatHistory';
    const EXPIRATION_DAYS = 7;

    const sessionId = localStorage.getItem("lisaSession") || crypto.randomUUID();
    localStorage.setItem("lisaSession", sessionId);

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        const name = fileInput.files[0].name;
        fileName.textContent = name; 
        filePreview.style.display = 'flex'; 
      } else {
        filePreview.style.display = 'none'; 
      }
    });

    removeFileBtn.addEventListener('click', () => {
      fileInput.value = null; 
      filePreview.style.display = 'none'; 
      fileName.textContent = '';
    });

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function getFormattedDate(dateString) {
      const today = new Date().toLocaleDateString('id-ID'); 
      const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('id-ID');
      
      if (dateString === today) return "Hari Ini";
      if (dateString === yesterday) return "Kemarin";
      return dateString; 
    }
    
    function linkify(text) {
      let processedText = text.replace(/\n/g, '<br>');
      processedText = processedText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
      const urlRegex = /(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])|(\bwww\.[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
      
      return processedText.replace(urlRegex, function(url) {
        if (url.includes('href="') || url.includes('src="')) {
          return url;
        }

        let href = url;
        if (url.startsWith('www.')) {
          href = 'http://' + url;
        }

        if (url.startsWith('https://files.lingkungansehatasri.my.id') && (url.includes('.mp4') || url.includes('.webm'))) {
          return `
            <video controls playsinline preload="metadata" style="width: 100%; max-width: 280px; border-radius: 10px; display: block; margin-top: 8px;">
              <source src="${url}" type="video/mp4">
            </video>
          `;
        }
        
        if (url.startsWith('https://files.lingkungansehatasri.my.id') && (url.includes('.jpg') || url.includes('.png'))) {
          return `<img src="${url}" alt="Lampiran" style="width: 100%; max-width: 250px; border-radius: 10px; display: block; margin-top: 8px;">`;
        }
        
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
      });
    }

    function addMessage(message, sender, save = true) {
      const text = message.text.trim(); 

      if (sender === "bot" && text.includes("[BUKA_FORM_LAPORAN]")) {
        openForm();
        return; 
      }
      
      if (message.date !== lastMessageDate) {
        const dateSep = document.createElement("div");
        dateSep.classList.add("date-separator");
        dateSep.textContent = getFormattedDate(message.date); 
        chatbox.appendChild(dateSep);
        lastMessageDate = message.date;
      }
      
      const msg = document.createElement("div");
      msg.classList.add("bubble", sender);
      const content = document.createElement("div");

      if (typeof text === 'string' && text.startsWith('data:image/')) {
        content.innerHTML = `<img src="${text}" alt="Lampiran gambar">`;
        msg.style.padding = '10px'; 
      } 
      else {
        content.innerHTML = linkify(text); 
      }
      
      msg.appendChild(content); 

      const timeContent = document.createElement("span");
      timeContent.classList.add("timestamp");
      timeContent.textContent = message.time; 
      msg.appendChild(timeContent);

      const isScrolledToBottom = chatbox.scrollHeight - chatbox.clientHeight <= chatbox.scrollTop + 100;
      
      chatbox.appendChild(msg);
      
      if (isScrolledToBottom) {
        chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });
      }

      if (text.startsWith("Saran & Masukan (ID:")) {
        save = false; 
      }

      if (save) {
        saveChatHistory(message, sender); 
      }
    }

    function addTyping() {
      const wrap = document.createElement("div");
      wrap.classList.add("bubble", "bot");
      wrap.id = "typing";
      wrap.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      chatbox.appendChild(wrap);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      const file = fileInput.files[0]; 

      if (!text && !file) return; 

      const now = new Date();
      const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
      const date = now.toLocaleDateString('id-ID');

      input.value = "";
      input.style.height = 'auto';
      fileInput.value = null; 
      filePreview.style.display = 'none';
      fileName.textContent = '';

      if (text) {
        addMessage({ text: text, time: time, date: date }, "user"); 
      }
      
      const formData = new FormData();
      formData.append('text', text);
      formData.append('sessionId', sessionId);

      if (file) {
        try {
          const base64src = await readFileAsDataURL(file);
          addMessage({ text: base64src, time: time, date: date }, "user"); 
        } catch (e) {
          addMessage({ text: "[Gagal memuat preview gambar]", time: time, date: date }, "user");
        }
        formData.append('file', file);
      }

      addTyping();

      try {
        const res = await fetch(webhookUrl, {
          method: "POST",
          body: formData 
        });

        const data = await res.json();
        removeTyping();
        
        const botNow = new Date();
        const botTime = botNow.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
        const botDate = botNow.toLocaleDateString('id-ID');

        const botReply = data.output || JSON.stringify(data, null, 2);
        addMessage({ text: botReply, time: botTime, date: botDate }, "bot"); 

        if (data.userInput && data.userInput.includes('https://')) {
          updateHistoryWithURL(data.userInput);
        }
        
      } catch (e) {
        removeTyping();
        const errTime = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
        const errDate = new Date().toLocaleDateString('id-ID');
        addMessage({ text: "⚠️ Gagal terhubung ke server. Coba lagi nanti.", time: errTime, date: errDate }, "bot");
        console.error(e);
      }
    }

    function updateHistoryWithURL(messageWithUrl) {
      const urlMatch = messageWithUrl.match(/https?:\/\/[^\s\]]+/);
      if (!urlMatch) return; 
      const s3Url = urlMatch[0];
      
      const stored = localStorage.getItem(HISTORY_KEY);
      if (!stored) return;
      
      try {
        let data = JSON.parse(stored);
        for (let i = data.chats.length - 1; i >= 0; i--) {
          if (data.chats[i].sender === 'user' && data.chats[i].message.text === '[Gambar dilampirkan]') {
            data.chats[i].message.text = s3Url; 
            break; 
          }
        }
        localStorage.setItem(HISTORY_KEY, JSON.stringify(data));
      } catch (e) {
        console.error("Gagal update history dengan URL S3:", e);
      }
    }

    function saveChatHistory(message, sender) {
      const stored = localStorage.getItem(HISTORY_KEY);
      let chats = [];
      if (stored) {
        try {
          chats = JSON.parse(stored).chats || [];
        } catch (e) { chats = []; }
      }
      chats.push({ message: message, sender: sender }); 
      const newData = {
        timestamp: new Date().getTime(),
        chats: chats
      };
      localStorage.setItem(HISTORY_KEY, JSON.stringify(newData));
    }

    function loadChatHistory() {
      const stored = localStorage.getItem(HISTORY_KEY);

      if (!stored) {
        const now = new Date();
        const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
        const date = now.toLocaleDateString('id-ID');

        const welcomeMsg = "haii! 👋 aku LISA.\naku siap bantu kamuu urusan sampah & lingkungan sekolah.\n\nketik 'menu' ajaa kalau mau liat apa yang bisa aku bantu yaa! 😉";

        addMessage({ text: welcomeMsg, time: time, date: date }, "bot", false);
        return;
      }

      try {
        const data = JSON.parse(stored);
        const now = new Date().getTime();
        const expirationTime = EXPIRATION_DAYS * 24 * 60 * 60 * 1000;
        
        if (now - data.timestamp > expirationTime) {
          localStorage.removeItem(HISTORY_KEY); 
          loadChatHistory(); 
          return; 
        }

        data.chats.forEach(item => {
          if (item.message.text === "[Gambar dilampirkan]") {
            return;
          }
          addMessage(item.message, item.sender, false); 
        });

      } catch (e) {
        console.error("Gagal memuat history chat:", e);
        localStorage.removeItem(HISTORY_KEY); 
      }
    }
    
    sendBtn.addEventListener("click", sendMessage);

    const isMobile = /Mobi/i.test(navigator.userAgent);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        if (e.shiftKey || isMobile) {
          return; 
        }
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = (input.scrollHeight) + 'px'; 
    });

    window.addEventListener("resize", () => {
      if (document.activeElement === input) {
        setTimeout(() => input.scrollIntoView({ behavior: "smooth", block: "end" }), 200);
      }
    });

    fileInput.value = null;
    filePreview.style.display = 'none';
    fileName.textContent = '';

    loadChatHistory();

    // --- FORM JS ---
    const formOverlay = document.getElementById('formOverlay');
    const formContainer = document.getElementById('formContainer');
    const closeFormBtn = document.getElementById('closeFormBtn');
    const submitFormBtn = document.getElementById('submitFormBtn');
    const formId = document.getElementById('formId');
    const formDate = document.getElementById('formDate');
    const formSaran = document.getElementById('formSaran');

    function openForm() {
      formId.value = sessionId.substring(0, 8); 
      formDate.value = new Date().toLocaleDateString('id-ID', { dateStyle: 'long' });
      formSaran.value = ''; 
      formOverlay.style.display = 'block';
      setTimeout(() => {
        formContainer.classList.add('form-visible');
      }, 10); 
    }
    
    function closeForm() {
      formContainer.classList.remove('form-visible');
      setTimeout(() => {
        formOverlay.style.display = 'none';
      }, 300);
    }
    
    closeFormBtn.addEventListener('click', (e) => {
      e.preventDefault();
      closeForm();
    });
    
    formOverlay.addEventListener('click', (e) => {
      if (e.target === formOverlay) {
        closeForm();
      }
    });
    
    submitFormBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const saran = formSaran.value.trim();
      
      if (!saran) {
        alert("Harap isi saran atau masukan kamu ya!");
        return;
      }
      
      input.value = `Saran & Masukan (ID: ${formId.value}):\n${saran}`;
      closeForm();
      sendMessage();
    });

    chatbox.addEventListener('scroll', () => {
      if (chatbox.scrollHeight - chatbox.scrollTop - chatbox.clientHeight > 100) {
        scrollToBottomBtn.style.display = 'flex';
      } else {
        scrollToBottomBtn.style.display = 'none';
      }
    });

    scrollToBottomBtn.addEventListener('click', () => {
      chatbox.scrollTo({
        top: chatbox.scrollHeight,
        behavior: 'smooth'
      });
    });

  </script>
</body>
</html>
