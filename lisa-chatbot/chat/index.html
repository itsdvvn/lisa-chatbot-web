<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chatbot LISA</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#006c4b",
                            "primary-variant": "#005238",
                            secondary: "#4d6357",
                            surface: "#f9f9f7",
                            "surface-container": "#eeeeec",
                            "on-surface": "#1a1c1b",
                            "on-surface-variant": "#404943",
                            outline: "#707973",
                            "outline-variant": "#c0c9c1",
                        },
                        fontFamily: {
                            sans: ["Inter", "sans-serif"],
                            display: ["Inter", "sans-serif"],
                        },
                        borderRadius: {
                            xl: "1rem",
                            "2xl": "1.5rem",
                            "3xl": "2rem",
                        },
                    },
                },
            };
        </script>
        <style>
            * {
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                margin: 0;
            }
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            #chatbox {
                scrollbar-width: thin;
                scrollbar-color: #c0c9c1 transparent;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
            }
            #chatbox::-webkit-scrollbar {
                width: 4px;
            }
            #chatbox::-webkit-scrollbar-thumb {
                background: #c0c9c1;
                border-radius: 4px;
            }
            .welcome-card {
                text-align: center;
                padding: 32px 20px 20px;
            }
            .welcome-card .avatar {
                width: 64px;
                height: 64px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid rgba(0, 108, 75, 0.15);
                margin: 0 auto 12px;
                display: block;
            }
            .welcome-card h2 {
                font-size: 1.125rem;
                font-weight: 700;
                color: #1a1c1b;
                margin-bottom: 4px;
            }
            .welcome-card p {
                font-size: 0.8125rem;
                color: #707973;
                line-height: 1.5;
                max-width: 280px;
                margin: 0 auto;
            }
            .suggestion-chips {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
                margin-top: 16px;
            }
            .suggestion-chip {
                background: #eeeeec;
                border: 1px solid #c0c9c1;
                border-radius: 100px;
                padding: 6px 14px;
                font-size: 0.75rem;
                font-weight: 600;
                color: #404943;
                cursor: pointer;
                transition: all 0.2s ease;
                -webkit-tap-highlight-color: transparent;
            }
            .suggestion-chip:hover {
                background: #006c4b;
                color: white;
                border-color: #006c4b;
            }
            .suggestion-chip:active {
                transform: scale(0.95);
            }
            .bubble.user {
                background: #006c4b;
                color: white;
                border-radius: 20px 20px 4px 20px;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            .bubble.bot {
                background: white;
                color: #1a1c1b;
                border-radius: 20px 20px 20px 4px;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
                word-break: break-word;
                overflow-wrap: break-word;
            }
            .bubble.user .timestamp {
                color: rgba(255, 255, 255, 0.7);
                opacity: 0;
                transition: opacity 0.2s ease;
            }
            .bubble.user:hover .timestamp,
            .bubble.user:focus-within .timestamp {
                opacity: 1;
            }
            .bubble.bot .timestamp {
                color: #707973;
                opacity: 0;
                transition: opacity 0.2s ease;
            }
            .bubble.bot:hover .timestamp,
            .bubble.bot:focus-within .timestamp {
                opacity: 1;
            }
            @keyframes msgIn {
                from {
                    opacity: 0;
                    transform: translateY(8px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            .bubble {
                animation: msgIn 0.25s ease-out;
            }
            .date-separator {
                text-align: center;
                font-size: 0.75rem;
                color: #707973;
                position: relative;
                margin: 16px 0;
            }
            .date-separator::before,
            .date-separator::after {
                content: "";
                position: absolute;
                top: 50%;
                width: 30%;
                height: 1px;
            }
            .date-separator::before {
                left: 0;
                background: linear-gradient(to right, transparent, #c0c9c1);
            }
            .date-separator::after {
                right: 0;
                background: linear-gradient(to left, transparent, #c0c9c1);
            }
            .typing {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 4px 8px;
            }
            .dot {
                width: 7px;
                height: 7px;
                background: #006c4b;
                border-radius: 50%;
                animation: bounceDot 1.4s infinite ease-in-out;
            }
            .dot:nth-child(2) {
                animation-delay: 0.2s;
            }
            .dot:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes bounceDot {
                0%,
                80%,
                100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
            .form-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.35);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                -webkit-tap-highlight-color: transparent;
                z-index: 100;
            }
            .form-container {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: white;
                border-radius: 2rem 2rem 0 0;
                padding: 24px 24px max(24px, env(safe-area-inset-bottom));
                z-index: 101;
                transform: translateY(100%);
                transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.12);
                -webkit-overflow-scrolling: touch;
            }
            .form-container.form-visible {
                transform: translateY(0);
            }
            @media (min-width: 640px) {
                .form-container {
                    border-radius: 2rem;
                    max-width: 440px;
                    left: 50%;
                    bottom: auto;
                    top: 50%;
                    max-height: min(90vh, 600px);
                    overflow-y: auto;
                    transform: translateY(calc(-50% + 20px));
                }
                .form-container.form-visible {
                    transform: translateY(-50%);
                }
            }
        </style>
    </head>
    <body class="font-sans bg-surface">
        <!-- Desktop wrapper -->
        <div
            class="sm:min-h-screen sm:flex sm:items-center sm:justify-center sm:p-4"
        >
            <div
                class="sm:w-full sm:max-w-2xl sm:h-[860px] sm:max-h-[95vh] sm:bg-white sm:rounded-[2rem] sm:shadow-xl sm:flex sm:flex-col sm:overflow-hidden sm:border sm:border-outline-variant/30"
            >
                <!-- HEADER -->
                <header
                    class="flex items-center px-5 py-3.5 bg-primary text-white shrink-0 gap-3"
                >
                    <img
                        src="https://files.lingkungansehatasri.my.id/lisa-profile-picture.jpg"
                        alt="Profile"
                        id="headerProfilePic"
                        class="w-10 h-10 rounded-full object-cover border-2 border-white/40 shadow-sm"
                    />
                    <div id="headerInfo" class="flex-1">
                        <h1 class="text-base font-bold leading-tight">
                            LISA Ai
                        </h1>
                        <p
                            class="text-xs text-white/70 flex items-center gap-1.5"
                        >
                            <span
                                class="w-1.5 h-1.5 rounded-full bg-green-300 animate-pulse inline-block"
                            ></span
                            >online
                        </p>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <button
                            id="clearChatBtn"
                            class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center shrink-0 transition active:scale-90"
                            aria-label="Hapus Riwayat Chat"
                            title="Hapus percakapan"
                        >
                            <span class="material-symbols-outlined text-[20px]"
                                >delete</span
                            >
                        </button>
                        <a
                            href="../"
                            class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center shrink-0 transition active:scale-90"
                            aria-label="Kembali ke Beranda"
                        >
                            <span class="material-symbols-outlined text-[20px]"
                                >home</span
                            >
                        </a>
                    </div>
                </header>

                <!-- CHAT MESSAGES -->
                <div
                    id="chatbox"
                    class="flex-1 overflow-y-auto px-4 pt-4 pb-2 bg-surface/50"
                >
                    <!-- Welcome card -->
                    <div id="welcomeCard" class="welcome-card">
                        <img
                            src="https://files.lingkungansehatasri.my.id/lisa-profile-picture.jpg"
                            alt="LISA"
                            class="avatar"
                            loading="lazy"
                        />
                        <h2>Hai, aku LISA! 👋</h2>
                        <p>
                            Tanya apa aja soal sampah, 3R, bank sampah, dan
                            lingkungan sekolah. Aku siap bantu 24 jam!
                        </p>
                        <div class="suggestion-chips">
                            <button class="suggestion-chip" data-suggestion="Apa itu 3R?">
                                Apa itu 3R?
                            </button>
                            <button class="suggestion-chip" data-suggestion="Cara daur ulang sampah plastik">
                                Daur ulang plastik
                            </button>
                            <button class="suggestion-chip" data-suggestion="Bank sampah terdekat">
                                Bank sampah
                            </button>
                        </div>
                    </div>
                </div>

                <!-- SCROLL TO BOTTOM -->
                <button
                    id="scrollToBottomBtn"
                    class="hidden absolute bottom-[90px] right-5 w-10 h-10 bg-white rounded-full shadow-lg items-center justify-center z-10 transition-all duration-200 hover:shadow-xl hover:-translate-y-0.5 active:scale-90 border border-outline-variant/20"
                    style="display: none"
                    aria-label="Gulir ke bawah"
                >
                    <span class="material-symbols-outlined text-primary"
                        >keyboard_double_arrow_down</span
                    >
                </button>

                <!-- INPUT AREA -->
                <div
                    id="inputArea"
                    class="bg-white border-t border-outline-variant/30 px-4 pt-3 pb-[max(12px,env(safe-area-inset-bottom))] shrink-0 relative"
                >
                    <div
                        id="filePreview"
                        style="display: none"
                        class="flex items-center gap-2 mb-2 px-3 py-1.5 bg-primary/10 rounded-lg text-sm"
                    >
                        <span
                            id="fileName"
                            class="text-primary truncate flex-1 text-xs"
                            >namafilepanjang.jpg</span
                        >
                        <button
                            id="removeFileBtn"
                            class="text-outline hover:text-on-surface text-lg leading-none cursor-pointer bg-transparent border-none"
                        >
                            &times;
                        </button>
                    </div>
                    <div class="flex items-end gap-2">
                        <div
                            class="flex-1 flex items-end gap-2 bg-surface rounded-2xl px-4 py-2 focus-within:ring-2 focus-within:ring-primary/30 focus-within:bg-white transition-all border border-outline-variant/30"
                        >
                            <textarea
                                id="userInput"
                                placeholder="Tulis pesanmu..."
                                rows="1"
                                class="flex-1 resize-none bg-transparent outline-none text-on-surface leading-relaxed max-h-28 py-1.5 font-sans placeholder:text-outline/60"
                                style="font-size:16px"
                            ></textarea>
                            <label
                                for="fileInput"
                                class="cursor-pointer p-1.5 rounded-full hover:bg-surface-container transition shrink-0"
                            >
                                <span
                                    class="material-symbols-outlined text-[20px] text-outline hover:text-primary"
                                    >attach_file</span
                                >
                            </label>
                            <input
                                type="file"
                                id="fileInput"
                                accept="image/*"
                                hidden
                            />
                        </div>
                        <button
                            id="sendBtn"
                            class="w-11 h-11 rounded-full bg-primary hover:bg-primary-variant flex items-center justify-center shrink-0 active:scale-90 transition-all shadow-md hover:shadow-lg disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none"
                            aria-label="Kirim pesan"
                        >
                            <span class="material-symbols-outlined text-white"
                                >send</span
                            >
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FORM OVERLAY -->
        <div class="form-overlay" id="formOverlay">
            <div class="form-container" id="formContainer">
                <button
                    id="closeFormBtn"
                    class="absolute top-4 right-5 bg-transparent border-none text-outline hover:text-on-surface cursor-pointer"
                >
                    <span class="material-symbols-outlined">close</span>
                </button>
                <div
                    class="w-10 h-10 bg-primary/10 text-primary rounded-xl flex items-center justify-center mb-4"
                >
                    <span class="material-symbols-outlined">edit_note</span>
                </div>
                <h3 class="text-lg font-bold text-on-surface mb-5">
                    Kasih Saran & Masukan
                </h3>
                <form class="space-y-4">
                    <div>
                        <label
                            for="formId"
                            class="block text-xs font-bold text-on-surface-variant mb-1 uppercase tracking-wide"
                            >ID Sesi (Otomatis)</label
                        >
                        <input
                            type="text"
                            id="formId"
                            readonly
                            class="w-full px-3.5 py-2.5 rounded-xl border border-outline-variant/50 bg-surface text-sm text-on-surface outline-none font-sans"
                        />
                    </div>
                    <div>
                        <label
                            for="formDate"
                            class="block text-xs font-bold text-on-surface-variant mb-1 uppercase tracking-wide"
                            >Tanggal (Otomatis)</label
                        >
                        <input
                            type="text"
                            id="formDate"
                            readonly
                            class="w-full px-3.5 py-2.5 rounded-xl border border-outline-variant/50 bg-surface text-sm text-on-surface outline-none font-sans"
                        />
                    </div>
                    <div>
                        <label
                            for="formSaran"
                            class="block text-xs font-bold text-on-surface-variant mb-1 uppercase tracking-wide"
                            >Saran & Masukan Kamu</label
                        >
                        <textarea
                            id="formSaran"
                            placeholder="Tulis saran/masukanmu soal lingkungan sekolah di sini..."
                            rows="4"
                            class="w-full px-3.5 py-2.5 rounded-xl border border-outline-variant/50 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none text-sm resize-none font-sans"
                        ></textarea>
                    </div>
                    <button
                        type="submit"
                        id="submitFormBtn"
                        class="w-full py-3 bg-primary hover:bg-primary-variant text-white font-bold rounded-full active:scale-[0.98] transition-all text-sm shadow-md"
                    >
                        Kirim Saran
                    </button>
                </form>
            </div>
        </div>

        <script>
            const chatbox = document.getElementById("chatbox");
            const input = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");
            const fileInput = document.getElementById("fileInput");
            const filePreview = document.getElementById("filePreview");
            const fileName = document.getElementById("fileName");
            const removeFileBtn = document.getElementById("removeFileBtn");
            const scrollToBottomBtn =
                document.getElementById("scrollToBottomBtn");
            const welcomeCard = document.getElementById("welcomeCard");
            const clearChatBtn = document.getElementById("clearChatBtn");
            let lastMessageDate = null;

            function hideWelcome() {
                if (welcomeCard) welcomeCard.style.display = "none";
            }

            function updateSendBtn() {
                const hasText = input.value.trim().length > 0;
                const hasFile = fileInput.files.length > 0;
                sendBtn.disabled = !hasText && !hasFile;
            }
            updateSendBtn();

            const webhookUrl =
                "https://n8n.terato.my.id/webhook/50e27e1d-f8f3-43e8-a1a8-53fa5eafecdf";
            const HISTORY_KEY = "lisaChatHistory";
            const EXPIRATION_DAYS = 7;

            const sessionId =
                localStorage.getItem("lisaSession") || crypto.randomUUID();
            localStorage.setItem("lisaSession", sessionId);

            // --- SUGGESTION CHIPS ---
            document.querySelectorAll(".suggestion-chip").forEach((chip) => {
                chip.addEventListener("click", () => {
                    input.value = chip.getAttribute("data-suggestion");
                    input.style.height = "auto";
                    input.style.height = input.scrollHeight + "px";
                    updateSendBtn();
                    sendMessage();
                });
            });

            // --- CLEAR CHAT ---
            clearChatBtn.addEventListener("click", () => {
                if (chatbox.children.length <= 1) return;
                if (
                    !confirm(
                        "Hapus seluruh riwayat percakapan?\n\nTindakan ini tidak bisa dibatalkan.",
                    )
                )
                    return;
                localStorage.removeItem(HISTORY_KEY);
                location.reload();
            });

            fileInput.addEventListener("change", () => {
                if (fileInput.files.length > 0) {
                    fileName.textContent = fileInput.files[0].name;
                    filePreview.style.display = "flex";
                } else {
                    filePreview.style.display = "none";
                }
                updateSendBtn();
            });
            removeFileBtn.addEventListener("click", () => {
                fileInput.value = null;
                filePreview.style.display = "none";
                fileName.textContent = "";
                updateSendBtn();
            });

            function readFileAsDataURL(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(reader.error);
                    reader.readAsDataURL(file);
                });
            }

            function getFormattedDate(dateString) {
                const today = new Date().toLocaleDateString("id-ID");
                const yesterday = new Date(
                    Date.now() - 86400000,
                ).toLocaleDateString("id-ID");
                if (dateString === today) return "Hari Ini";
                if (dateString === yesterday) return "Kemarin";
                return dateString;
            }

            function linkify(text) {
                let processedText = text.replace(/\n/g, "<br>");
                processedText = processedText.replace(
                    /\*(.*?)\*/g,
                    "<strong>$1</strong>",
                );
                const urlRegex =
                    /(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])|(\bwww\.[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/gi;
                return processedText.replace(urlRegex, function (url) {
                    if (url.includes('href="') || url.includes('src="'))
                        return url;
                    let href = url;
                    if (url.startsWith("www.")) href = "http://" + url;
                    if (
                        url.startsWith(
                            "https://files.lingkungansehatasri.my.id",
                        ) &&
                        (url.includes(".mp4") || url.includes(".webm"))
                    ) {
                        return (
                            '<video controls playsinline preload="metadata" style="width:100%;max-width:280px;border-radius:10px;display:block;margin-top:8px;"><source src="' +
                            url +
                            '" type="video/mp4"></video>'
                        );
                    }
                    if (
                        url.startsWith(
                            "https://files.lingkungansehatasri.my.id",
                        ) &&
                        (url.includes(".jpg") || url.includes(".png"))
                    ) {
                        return (
                            '<img src="' +
                            url +
                            '" alt="Lampiran" style="width:100%;max-width:250px;border-radius:10px;display:block;margin-top:8px;">'
                        );
                    }
                    return (
                        '<a href="' +
                        href +
                        '" target="_blank" rel="noopener noreferrer" style="color:#006c4b;text-decoration:underline;">' +
                        url +
                        "</a>"
                    );
                });
            }

            function addMessage(message, sender, save = true) {
                const text = message.text.trim();
                if (sender === "bot" && text.includes("[BUKA_FORM_LAPORAN]")) {
                    openForm();
                    return;
                }
                if (message.date !== lastMessageDate) {
                    const dateSep = document.createElement("div");
                    dateSep.classList.add("date-separator");
                    dateSep.textContent = getFormattedDate(message.date);
                    chatbox.appendChild(dateSep);
                    lastMessageDate = message.date;
                }
                const msg = document.createElement("div");
                msg.classList.add(
                    "bubble",
                    sender,
                    "py-1.5",
                    "px-3",
                    "mb-2",
                    "max-w-[85%]",
                    "sm:max-w-[70%]",
                    "text-sm",
                    "leading-relaxed",
                    "relative",
                );
                if (sender === "user") msg.classList.add("ml-auto");
                else msg.classList.add("mr-auto");
                const content = document.createElement("div");
                if (
                    typeof text === "string" &&
                    text.startsWith("data:image/")
                ) {
                    content.innerHTML =
                        '<img src="' +
                        text +
                        '" alt="Lampiran gambar" style="max-width:200px;border-radius:8px;display:block">';
                    msg.style.padding = "8px";
                } else {
                    content.innerHTML = linkify(text);
                }
                msg.appendChild(content);
                const timeContent = document.createElement("span");
                timeContent.classList.add(
                    "timestamp",
                    "block",
                    "text-[10px]",
                    "mt-1.5",
                );
                timeContent.textContent = message.time;
                msg.appendChild(timeContent);
                const isScrolledToBottom =
                    chatbox.scrollHeight - chatbox.clientHeight <=
                    chatbox.scrollTop + 100;
                chatbox.appendChild(msg);
                if (isScrolledToBottom)
                    chatbox.scrollTo({
                        top: chatbox.scrollHeight,
                        behavior: "smooth",
                    });
                if (text.startsWith("Saran & Masukan (ID:")) save = false;
                if (save) saveChatHistory(message, sender);
            }

            function addTyping() {
                const wrap = document.createElement("div");
                wrap.classList.add(
                    "bubble",
                    "bot",
                    "mr-auto",
                    "px-4",
                    "py-3",
                    "mb-2",
                );
                wrap.id = "typing";
                wrap.innerHTML =
                    '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
                chatbox.appendChild(wrap);
                chatbox.scrollTop = chatbox.scrollHeight;
            }

            function removeTyping() {
                const t = document.getElementById("typing");
                if (t) t.remove();
            }

            async function sendMessage() {
                const text = input.value.trim();
                const file = fileInput.files[0];
                if (!text && !file) return;
                hideWelcome();
                const now = new Date();
                const time = now
                    .toLocaleTimeString("id-ID", {
                        hour: "2-digit",
                        minute: "2-digit",
                    })
                    .replace(".", ":");
                const date = now.toLocaleDateString("id-ID");
                input.value = "";
                input.style.height = "auto";
                fileInput.value = null;
                filePreview.style.display = "none";
                fileName.textContent = "";
                updateSendBtn();
                if (text) addMessage({ text, time, date }, "user");
                const formData = new FormData();
                formData.append("text", text);
                formData.append("sessionId", sessionId);
                if (file) {
                    try {
                        const b = await readFileAsDataURL(file);
                        addMessage({ text: b, time, date }, "user");
                    } catch (e) {
                        addMessage(
                            {
                                text: "[Gagal memuat preview gambar]",
                                time,
                                date,
                            },
                            "user",
                        );
                    }
                    formData.append("file", file);
                }
                addTyping();
                try {
                    const res = await fetch(webhookUrl, {
                        method: "POST",
                        body: formData,
                    });
                    const data = await res.json();
                    removeTyping();
                    const botNow = new Date();
                    const botTime = botNow
                        .toLocaleTimeString("id-ID", {
                            hour: "2-digit",
                            minute: "2-digit",
                        })
                        .replace(".", ":");
                    const botDate = botNow.toLocaleDateString("id-ID");
                    addMessage(
                        {
                            text: data.output || JSON.stringify(data, null, 2),
                            time: botTime,
                            date: botDate,
                        },
                        "bot",
                    );
                    if (data.userInput && data.userInput.includes("https://"))
                        updateHistoryWithURL(data.userInput);
                } catch (e) {
                    removeTyping();
                    const et = new Date()
                        .toLocaleTimeString("id-ID", {
                            hour: "2-digit",
                            minute: "2-digit",
                        })
                        .replace(".", ":");
                    const ed = new Date().toLocaleDateString("id-ID");
                    addMessage(
                        {
                            text: "⚠️ Gagal terhubung ke server. Coba lagi nanti.",
                            time: et,
                            date: ed,
                        },
                        "bot",
                    );
                    console.error(e);
                }
            }

            function updateHistoryWithURL(m) {
                const u = m.match(/https?:\/\/[^\s\]]+/);
                if (!u) return;
                const s = u[0];
                const st = localStorage.getItem(HISTORY_KEY);
                if (!st) return;
                try {
                    let d = JSON.parse(st);
                    for (let i = d.chats.length - 1; i >= 0; i--) {
                        if (
                            d.chats[i].sender === "user" &&
                            d.chats[i].message.text === "[Gambar dilampirkan]"
                        ) {
                            d.chats[i].message.text = s;
                            break;
                        }
                    }
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(d));
                } catch (e) {}
            }

            function saveChatHistory(message, sender) {
                const st = localStorage.getItem(HISTORY_KEY);
                let chats = [];
                if (st) {
                    try {
                        chats = JSON.parse(st).chats || [];
                    } catch (e) {}
                }
                chats.push({ message, sender });
                localStorage.setItem(
                    HISTORY_KEY,
                    JSON.stringify({ timestamp: new Date().getTime(), chats }),
                );
            }

            function loadChatHistory() {
                const st = localStorage.getItem(HISTORY_KEY);
                if (!st) {
                    // Welcome card is shown by default
                    return;
                }
                try {
                    const data = JSON.parse(st);
                    const now = new Date().getTime();
                    if (
                        now - data.timestamp >
                        EXPIRATION_DAYS * 24 * 60 * 60 * 1000
                    ) {
                        localStorage.removeItem(HISTORY_KEY);
                        return;
                    }
                    if (data.chats.length > 0) hideWelcome();
                    data.chats.forEach((item) => {
                        if (item.message.text === "[Gambar dilampirkan]")
                            return;
                        addMessage(item.message, item.sender, false);
                    });
                } catch (e) {
                    console.error("Gagal memuat history chat:", e);
                    localStorage.removeItem(HISTORY_KEY);
                }
            }

            sendBtn.addEventListener("click", sendMessage);
            const isMobile = /Mobi/i.test(navigator.userAgent);
            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    if (e.shiftKey || isMobile) return;
                    e.preventDefault();
                    sendMessage();
                }
            });
            input.addEventListener("input", () => {
                input.style.height = "auto";
                input.style.height = Math.min(input.scrollHeight, 112) + "px";
                updateSendBtn();
            });
            input.addEventListener("focus", () => {
                setTimeout(() => {
                    input.scrollIntoView({ behavior: "smooth", block: "end" });
                }, 300);
            });
            window.addEventListener("resize", () => {
                if (document.activeElement === input)
                    setTimeout(
                        () =>
                            input.scrollIntoView({
                                behavior: "smooth",
                                block: "end",
                            }),
                        200,
                    );
            });
            fileInput.value = null;
            filePreview.style.display = "none";
            fileName.textContent = "";
            loadChatHistory();

            // --- FORM ---
            const formOverlay = document.getElementById("formOverlay");
            const formContainer = document.getElementById("formContainer");
            const closeFormBtn = document.getElementById("closeFormBtn");
            const submitFormBtn = document.getElementById("submitFormBtn");
            const formId = document.getElementById("formId");
            const formDate = document.getElementById("formDate");
            const formSaran = document.getElementById("formSaran");
            function openForm() {
                formId.value = sessionId.substring(0, 8);
                formDate.value = new Date().toLocaleDateString("id-ID", {
                    dateStyle: "long",
                });
                formSaran.value = "";
                formOverlay.style.display = "block";
                setTimeout(
                    () => formContainer.classList.add("form-visible"),
                    10,
                );
            }
            function closeForm() {
                formContainer.classList.remove("form-visible");
                setTimeout(() => (formOverlay.style.display = "none"), 300);
            }
            closeFormBtn.addEventListener("click", (e) => {
                e.preventDefault();
                closeForm();
            });
            formOverlay.addEventListener("click", (e) => {
                if (e.target === formOverlay) closeForm();
            });
            submitFormBtn.addEventListener("click", (e) => {
                e.preventDefault();
                const s = formSaran.value.trim();
                if (!s) {
                    alert("Harap isi saran atau masukan kamu ya!");
                    return;
                }
                input.value =
                    "Saran & Masukan (ID: " + formId.value + "):\n" + s;
                closeForm();
                sendMessage();
            });

            chatbox.addEventListener("scroll", () => {
                if (
                    chatbox.scrollHeight -
                        chatbox.scrollTop -
                        chatbox.clientHeight >
                    100
                ) {
                    scrollToBottomBtn.style.display = "flex";
                    scrollToBottomBtn.classList.add("visible");
                } else {
                    scrollToBottomBtn.style.display = "none";
                    scrollToBottomBtn.classList.remove("visible");
                }
            });
            scrollToBottomBtn.addEventListener("click", () => {
                chatbox.scrollTo({
                    top: chatbox.scrollHeight,
                    behavior: "smooth",
                });
            });
        </script>
    </body>
</html>
