<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
        <meta name="theme-color" content="#006c4b" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <link rel="manifest" href="/lisa-chatbot/manifest.json" />
        <link rel="apple-touch-icon" href="https://files.lingkungansehatasri.my.id/lisa-profile-picture.jpg" />
        <title>Chatbot LISA</title>

        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#006c4b",
                            "primary-variant": "#005238",
                            secondary: "#4d6357",
                            surface: "#f9f9f7",
                            "surface-container": "#eeeeec",
                            "on-surface": "#1a1c1b",
                            "on-surface-variant": "#404943",
                            outline: "#707973",
                            "outline-variant": "#c0c9c1",
                        },
                        fontFamily: { sans: ["Inter", "sans-serif"], display: ["Inter", "sans-serif"] },
                        borderRadius: { xl: "1rem", "2xl": "1.5rem", "3xl": "2rem" },
                    },
                },
            };
        </script>
        <link rel="stylesheet" href="../css/chat.css" />
    </head>
    <body class="font-sans bg-surface">
        <!-- PULL-TO-REFRESH INDICATOR -->
        <div id="ptrIndicator" class="ptr-indicator">
            <span class="material-symbols-outlined">refresh</span>
        </div>

        <!-- Desktop wrapper -->
        <div class="sm:min-h-screen sm:flex sm:items-center sm:justify-center sm:p-4">
            <div class="sm:w-full sm:max-w-2xl sm:h-[860px] sm:max-h-[95vh] sm:bg-white sm:rounded-[2rem] sm:shadow-xl sm:flex sm:flex-col sm:overflow-hidden sm:border sm:border-outline-variant/30">
                <!-- HEADER -->
                <header class="flex items-center px-5 py-3.5 bg-primary text-white shrink-0 gap-3">
                    <img src="https://files.lingkungansehatasri.my.id/lisa-profile-picture.jpg" alt="Profile" id="headerProfilePic" class="w-10 h-10 rounded-full object-cover border-2 border-white/40 shadow-sm" />
                    <div id="headerInfo" class="flex-1">
                        <h1 class="text-base font-bold leading-tight">LISA Ai</h1>
                        <p class="text-xs text-white/70 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-300 animate-pulse inline-block"></span>online
                        </p>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <!-- Dark mode toggle -->
                        <button id="chatDarkToggle" class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center shrink-0 transition active:scale-90" aria-label="Mode Gelap">
                            <span class="material-symbols-outlined text-[20px]">dark_mode</span>
                        </button>
                        <!-- Export chat -->
                        <button id="exportChatBtn" class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center shrink-0 transition active:scale-90" aria-label="Download Chat" title="Download percakapan">
                            <span class="material-symbols-outlined text-[20px]">download</span>
                        </button>
                        <!-- Clear chat -->
                        <button id="clearChatBtn" class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center shrink-0 transition active:scale-90" aria-label="Hapus Riwayat Chat" title="Hapus percakapan">
                            <span class="material-symbols-outlined text-[20px]">delete</span>
                        </button>
                        <a href="../" class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center shrink-0 transition active:scale-90" aria-label="Kembali ke Beranda">
                            <span class="material-symbols-outlined text-[20px]">home</span>
                        </a>
                    </div>
                </header>

                <!-- CHAT MESSAGES -->
                <div id="chatbox" class="flex-1 overflow-y-auto px-4 pt-4 pb-2 bg-surface/50">
                    <!-- Welcome card -->
                    <div id="welcomeCard" class="welcome-card">
                        <img src="https://files.lingkungansehatasri.my.id/lisa-profile-picture.jpg" alt="LISA" class="avatar" loading="lazy" />
                        <h2>Hai, aku LISA! 👋</h2>
                        <p>Tanya apa aja soal sampah, 3R, bank sampah, dan lingkungan sekolah. Aku siap bantu 24 jam!</p>
                        <div class="suggestion-chips">
                            <button class="suggestion-chip" data-suggestion="Apa itu 3R?">Apa itu 3R?</button>
                            <button class="suggestion-chip" data-suggestion="Cara daur ulang sampah plastik">Daur ulang plastik</button>
                            <button class="suggestion-chip" data-suggestion="Bank sampah terdekat">Bank sampah</button>
                        </div>
                    </div>
                </div>

                <!-- SCROLL TO BOTTOM -->
                <button id="scrollToBottomBtn" class="hidden absolute bottom-[90px] right-5 w-10 h-10 bg-white rounded-full shadow-lg items-center justify-center z-10 transition-all duration-200 hover:shadow-xl hover:-translate-y-0.5 active:scale-90 border border-outline-variant/20" style="display: none" aria-label="Gulir ke bawah">
                    <span class="material-symbols-outlined text-primary">keyboard_double_arrow_down</span>
                </button>

                <!-- INPUT AREA -->
                <div id="inputArea" class="bg-white border-t border-outline-variant/30 px-4 pt-3 pb-[max(12px,env(safe-area-inset-bottom))] shrink-0 relative">
                    <div id="filePreview" style="display: none" class="flex items-center gap-2 mb-2 px-3 py-1.5 bg-primary/10 rounded-lg text-sm">
                        <span class="material-symbols-outlined text-primary text-[18px]">attach_file</span>
                        <span id="fileName" class="text-primary truncate flex-1 text-xs">namafilepanjang.jpg</span>
                        <button id="removeFileBtn" class="text-outline hover:text-on-surface text-lg leading-none cursor-pointer bg-transparent border-none">&times;</button>
                    </div>
                    <div class="flex items-end gap-2">
                        <div class="flex-1 flex items-end gap-2 bg-surface rounded-2xl px-4 py-2 focus-within:ring-2 focus-within:ring-primary/30 focus-within:bg-white transition-all border border-outline-variant/30">
                            <!-- Voice input button -->
                            <button id="voiceBtn" class="voice-btn cursor-pointer p-1.5 rounded-full hover:bg-surface-container transition shrink-0 bg-transparent border-none" aria-label="Rekam suara">
                                <span class="material-symbols-outlined text-[20px] text-outline hover:text-primary">mic</span>
                            </button>
                            <textarea id="userInput" placeholder="Tulis pesanmu..." rows="1" class="flex-1 resize-none bg-transparent outline-none text-on-surface leading-relaxed max-h-28 py-1.5 font-sans placeholder:text-outline/60" style="font-size: 16px"></textarea>
                            <label for="fileInput" class="cursor-pointer p-1.5 rounded-full hover:bg-surface-container transition shrink-0">
                                <span class="material-symbols-outlined text-[20px] text-outline hover:text-primary">attach_file</span>
                            </label>
                            <input type="file" id="fileInput" accept="image/*,application/pdf" multiple hidden />
                        </div>
                        <button id="sendBtn" class="w-11 h-11 rounded-full bg-primary hover:bg-primary-variant flex items-center justify-center shrink-0 active:scale-90 transition-all shadow-md hover:shadow-lg disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none" aria-label="Kirim pesan">
                            <span class="material-symbols-outlined text-white">send</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FORM OVERLAY -->
        <div class="form-overlay" id="formOverlay">
            <div class="form-container" id="formContainer">
                <button id="closeFormBtn" class="absolute top-4 right-5 bg-transparent border-none text-outline hover:text-on-surface cursor-pointer">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <div class="w-10 h-10 bg-primary/10 text-primary rounded-xl flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined">edit_note</span>
                </div>
                <h3 class="text-lg font-bold text-on-surface mb-5">Kasih Saran & Masukan</h3>
                <form class="space-y-4">
                    <div>
                        <label for="formId" class="block text-xs font-bold text-on-surface-variant mb-1 uppercase tracking-wide">ID Sesi (Otomatis)</label>
                        <input type="text" id="formId" readonly class="w-full px-3.5 py-2.5 rounded-xl border border-outline-variant/50 bg-surface text-sm text-on-surface outline-none font-sans" />
                    </div>
                    <div>
                        <label for="formDate" class="block text-xs font-bold text-on-surface-variant mb-1 uppercase tracking-wide">Tanggal (Otomatis)</label>
                        <input type="text" id="formDate" readonly class="w-full px-3.5 py-2.5 rounded-xl border border-outline-variant/50 bg-surface text-sm text-on-surface outline-none font-sans" />
                    </div>
                    <div>
                        <label for="formSaran" class="block text-xs font-bold text-on-surface-variant mb-1 uppercase tracking-wide">Saran & Masukan Kamu</label>
                        <textarea id="formSaran" placeholder="Tulis saran/masukanmu soal lingkungan sekolah di sini..." rows="4" class="w-full px-3.5 py-2.5 rounded-xl border border-outline-variant/50 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none text-sm resize-none font-sans"></textarea>
                    </div>
                    <button type="submit" id="submitFormBtn" class="w-full py-3 bg-primary hover:bg-primary-variant text-white font-bold rounded-full active:scale-[0.98] transition-all text-sm shadow-md">Kirim Saran</button>
                </form>
            </div>
        </div>

        <script src="../js/utils.js"></script>
        <script src="../js/chat.js"></script>
    </body>
</html>
